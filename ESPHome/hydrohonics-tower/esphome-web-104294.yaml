esphome:
  name: esphome-web-104294
  friendly_name: ESPHome Hydrophonic tower
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# This fixes the warning and adds a recovery web interface
captive_portal:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot
  ap:
    ssid: "Water-Pump-Hotspot"

# Add this to your existing configuration
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLUP
      inverted: true
    name: "Pump Manual Button"
    on_press:
      - switch.toggle: water_pump

sensor:
  - platform: wifi_signal
    name: "Pump WiFi Signal"
    update_interval: 60s

output:
  - platform: gpio
    pin: GPIO17
    id: pump_relay_pin

  - platform: gpio
    pin: GPIO19
    id: status_led_pin

light:
  - platform: binary
    id: pump_status_led
    output: status_led_pin
    internal: true 

switch:
  - platform: output
    name: "Water Pump"
    id: water_pump
    output: pump_relay_pin
    icon: "mdi:water-pump"
    
    # Logic for LED and Safety Timer
    on_turn_on:
      - light.turn_on: pump_status_led
      - delay: 30min
      - if:
          condition:
            switch.is_on: water_pump
          then:
            - switch.turn_off: water_pump
            - logger.log: "Runaway Protection triggered: Pump shut off after 30 mins."
            
    on_turn_off:
      - light.turn_off: pump_status_led
