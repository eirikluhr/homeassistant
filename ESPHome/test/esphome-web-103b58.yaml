esphome:
  name: esphome-web-103b58
  friendly_name: ESPHome Web 103b58
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

light:
  - platform: binary
    name: "Blue LED"
    id: my_led
    output: led_output

output:
  - id: led_output
    platform: gpio
    pin: GPIO18

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO20
      mode: INPUT_PULLUP
      inverted: true
    name: "Physical Toggle Switch"
    # When you flip the switch ON:
    on_press:
      then:
        - light.turn_on: my_led
    # When you flip the switch OFF:
    on_release:
      then:
        - delay: 5s
        - light.turn_off: my_led
