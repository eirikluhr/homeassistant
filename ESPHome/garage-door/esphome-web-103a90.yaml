esphome:
  name: esphome-web-103a90
  friendly_name: ESPHome Garage Controller
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

time:
  - platform: homeassistant
    id: homeassistant_time

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# 1. THE TRIGGERS (Optoisolators)
switch:
  - platform: gpio
    pin: GPIO16
    id: door_1_trigger
    internal: true
    on_turn_on:
      - delay: 500ms
      - switch.turn_off: door_1_trigger

  - platform: gpio
    pin: GPIO23
    id: door_2_trigger
    internal: true
    on_turn_on:
      - delay: 500ms
      - switch.turn_off: door_2_trigger

# 2. THE SENSORS
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
    id: door_1_sensor
    name: "Door 1 Closed Sensor"
    device_class: garage_door

  - platform: gpio
    pin:
      number: GPIO19
      mode: INPUT_PULLUP
    id: door_2_sensor
    name: "Door 2 Closed Sensor"
    device_class: garage_door

# 3. THE COVERS (With Timeout Logic)
cover:
  - platform: template
    name: "Garage Door 1"
    device_class: garage
    lambda: |-
      if (id(door_1_sensor).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
    close_action:
      - switch.turn_on: door_1_trigger
      - wait_until:
          condition:
            # We wait for the sensor to report CLOSED (False in your logic)
            binary_sensor.is_off: door_1_sensor
          timeout: 20s
      - if:
          condition:
            # If it's STILL OPEN (True) after 20s, fire an event
            binary_sensor.is_on: door_1_sensor
          then:
            - homeassistant.event:
                event: esphome.garage_error
                data:
                  title: "Garage Door 1 Error"
                  message: "Door failed to close within 20 seconds!"
    open_action:
      - switch.turn_on: door_1_trigger
      - homeassistant.service:
          service: input_datetime.set_datetime
          data:
            entity_id: input_datetime.garage_door_1_last_action
            timestamp: !lambda "return id(homeassistant_time).now().timestamp;"

  - platform: template
    name: "Garage Door 2"
    device_class: garage
    lambda: |-
      if (id(door_2_sensor).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
    close_action:
      - switch.turn_on: door_2_trigger
      - wait_until:
          condition:
            binary_sensor.is_off: door_2_sensor
          timeout: 20s
      - if:
          condition:
            binary_sensor.is_on: door_2_sensor
          then:
            - homeassistant.event:
                event: esphome.garage_error
                data:
                  title: "Garage Door 2 Error"
                  message: "Door failed to close within 20 seconds!"
    open_action:
      - switch.turn_on: door_2_trigger
      - homeassistant.service:
          service: input_datetime.set_datetime
          data:
            entity_id: input_datetime.garage_door_2_last_action
            timestamp: !lambda "return id(homeassistant_time).now().timestamp;"

